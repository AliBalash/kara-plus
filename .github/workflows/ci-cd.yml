name: CI/CD

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, intl, sqlite3, pdo_sqlite, dom, curl, fileinfo, gd, bcmath, zip, xml, exif
          tools: composer:v2
          coverage: none

      - name: Validate Composer manifest
        run: composer validate --strict

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel test environment
        run: |
          mkdir -p bootstrap/cache storage/framework/cache/data storage/framework/sessions storage/framework/testing storage/framework/views database
          touch database/database.sqlite
          cat > .env <<EOF
          APP_ENV=testing
          APP_DEBUG=true
          APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          APP_URL=http://127.0.0.1
          CACHE_STORE=array
          SESSION_DRIVER=array
          QUEUE_CONNECTION=sync
          MAIL_MAILER=array
          DB_CONNECTION=sqlite
          DB_DATABASE=${GITHUB_WORKSPACE}/database/database.sqlite
          EOF
          php artisan key:generate --force

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test --no-interaction --without-tty

      - name: Validate deploy assets
        run: |
          cat > .ci.env.docker <<'EOF'
          APP_ENV=production
          APP_DEBUG=false
          APP_LOCAL_HTTP_PORT=18000
          APP_LOCAL_PORT=18001
          PMA_LOCAL_PORT=18002
          ELASTICSEARCH_LOCAL_PORT=19200
          KIBANA_LOCAL_PORT=15601
          MYSQL_DATABASE=ci_db
          MYSQL_USER=ci_user
          MYSQL_PASSWORD=ci_password
          MYSQL_ROOT_PASSWORD=ci_root_password
          ELASTICSEARCH_PASSWORD=ci_elastic_password
          KIBANA_SYSTEM_PASSWORD=ci_kibana_system_password
          KIBANA_LOGIN_USERNAME=kibana_admin
          KIBANA_LOGIN_PASSWORD=ci_kibana_login_password
          KIBANA_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
          EOF
          docker compose --env-file .ci.env.docker -f docker-compose.yml config >/dev/null
          bash -n deploy.sh
          sh -n docker/nginx/40-ensure-certs.sh

  deploy:
    needs: verify
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
    runs-on: self-hosted
    timeout-minutes: 30
    environment: production

    steps:
      - name: Run deploy script
        run: bash /opt/apps/kara-plus/deploy.sh
